services:
  - type: web
    name: velocity-karting-production
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js --bind 0.0.0.0
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
